name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '1.1'
  BUN_VERSION: '1.1'

jobs:
  # ── Backend Tests ──────────────────────────────────────────
  backend-test:
    name: Backend Test (Bun)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ecomai_test
          POSTGRES_USER: ecomai
          POSTGRES_PASSWORD: ecomai_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: oven/bun-action@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup test environment
        env:
          DATABASE_URL: postgresql://ecomai:ecomai_secret@localhost:5432/ecomai_test
          JWT_SECRET: test-jwt-secret-for-ci-only-64-chars-minimum-requirement
          NODE_ENV: test
        run: |
          cp .env.example .env
          sed -i 's|postgresql://ecomai:ecomai_secret@127.0.0.1:5432/ecomai|postgresql://ecomai:ecomai_secret@localhost:5432/ecomai_test|' .env

      - name: Run database migrations
        run: bun run db/migrate.js --no-seed
        env:
          DATABASE_URL: postgresql://ecomai:ecomai_secret@localhost:5432/ecomai_test

      - name: Run backend tests
        run: bun test --reporter=verbose
        env:
          DATABASE_URL: postgresql://ecomai:ecomai_secret@localhost:5432/ecomai_test
          JWT_SECRET: test-jwt-secret-for-ci-only-64-chars-minimum-requirement
          NODE_ENV: test

  # ── Frontend Lint & Type Check ────────────────────────────
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven/bun-action@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install
        working-directory: frontend

      - name: Run ESLint
        run: bun run lint
        working-directory: frontend

  # ── Frontend Build ────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: [frontend-lint]

    steps:
      - uses: actions/checkout@v4

      - uses: oven/bun-action@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install
        working-directory: frontend

      - name: Build frontend
        run: bun run build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:3000

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ── Docker Build (Backend) ─────────────────────────────────
  docker-backend:
    name: Docker Build (Backend)
    runs-on: ubuntu-latest
    needs: [backend-test]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ecomai/backend:${{ github.sha }}
            ecomai/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Docker Build (Frontend) ────────────────────────────────
  docker-frontend:
    name: Docker Build (Frontend)
    runs-on: ubuntu-latest
    needs: [frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'

      - name: Build frontend
        run: |
          cd frontend && bun install && bun run build
        env:
          VITE_API_URL: https://api.ecomai.com

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ecomai/frontend:${{ github.sha }}
            ecomai/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Security Scan (Bun / npm audit equivalent) ───────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven/bun-action@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install && bun audit

      - name: Run npm audit (backend deps)
        run: bun run audit 2>/dev/null || true
